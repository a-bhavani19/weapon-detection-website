<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weapon Detection System — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  background: #08090d;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: -200px; left: -200px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(59,126,255,0.12), transparent 70%);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  bottom: -200px; right: -200px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(255,61,61,0.08), transparent 70%);
  pointer-events: none;
}
.grid-bg {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none;
  z-index: 0;
}
.wrapper {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 440px;
  padding: 24px;
}
.card {
  background: #0f1117;
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 20px;
  padding: 44px 40px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
}
.card-header { text-align: center; margin-bottom: 36px; }
.shield-wrap {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 64px; height: 64px;
  background: linear-gradient(135deg, #3b7eff, #7b2fff);
  border-radius: 18px;
  font-size: 30px;
  margin-bottom: 20px;
  box-shadow: 0 8px 30px rgba(59,126,255,0.35);
}
.card-title {
  font-family: 'Syne', sans-serif;
  font-size: 26px;
  font-weight: 800;
  color: #ffffff;
  letter-spacing: 0.5px;
  line-height: 1.2;
  margin-bottom: 8px;
}
.card-subtitle { font-size: 14px; color: #5a6480; font-weight: 400; }
.error-box {
  background: rgba(255,61,61,0.1);
  border: 1px solid rgba(255,61,61,0.25);
  color: #f87171;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 20px;
  text-align: center;
}
.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: #8a9ab0;
  margin-bottom: 7px;
}
.form-input {
  width: 100%;
  padding: 13px 16px;
  background: #161820;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  color: #e4e8f0;
  font-size: 15px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-input::placeholder { color: #3a4a6a; }
.form-input:focus {
  border-color: rgba(59,126,255,0.5);
  box-shadow: 0 0 0 3px rgba(59,126,255,0.1);
}
.forgot-row {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 24px;
  margin-top: -6px;
}
.forgot-link { font-size: 13px; font-weight: 600; color: #3b7eff; text-decoration: none; transition: color 0.2s; }
.forgot-link:hover { color: #7baeff; }
.login-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #3b7eff, #7b2fff);
  border: none;
  border-radius: 12px;
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 20px rgba(59,126,255,0.3);
}
.login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(59,126,255,0.45); }
.divider { display: flex; align-items: center; gap: 14px; margin: 24px 0; }
.divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.07); }
.divider-text { font-size: 12px; color: #3a4a6a; font-weight: 500; white-space: nowrap; }
.register-row { text-align: center; }
.register-row p { font-size: 14px; color: #5a6480; }
.register-link { color: #3b7eff; font-weight: 700; text-decoration: none; }
.register-link:hover { color: #7baeff; }
.status-strip {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  margin-top: 28px;
  font-size: 12px;
  color: #3a4a6a;
  font-weight: 500;
}
.status-dot {
  width: 7px; height: 7px;
  background: #00e676;
  border-radius: 50%;
  box-shadow: 0 0 8px #00e676;
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="wrapper">
  <div class="card">
    <div class="card-header">
      <div class="shield-wrap">🛡</div>
      <div class="card-title">Weapon Detection<br>System</div>
      <div class="card-subtitle">Sign in to access your security dashboard</div>
    </div>
    {% if error %}
    <div class="error-box">⚠ {{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" placeholder="Enter your password" required>
      </div>
      <div class="forgot-row">
        <a href="{{ url_for('forgot') }}" class="forgot-link">Forgot password?</a>
      </div>
      <button type="submit" class="login-btn">Sign In →</button>
    </form>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">New to the system?</div>
      <div class="divider-line"></div>
    </div>
    <div class="register-row">
      <p>Don't have an account? <a href="{{ url_for('register') }}" class="register-link">Create one →</a></p>
    </div>
    <div class="status-strip">
      <div class="status-dot"></div>
      System Online — AI Detection Active
    </div>
  </div>
</div>
</body>
</html>
